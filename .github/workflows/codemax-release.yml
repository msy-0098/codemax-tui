name: CodeMax private release

on:
  push:
    tags:
      - "codemax-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "CodeMax version without v"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install Pillow==12.0.0
      - run: bun install --frozen-lockfile
      - working-directory: packages/opencode
        run: bun test test/script/brand-assets.test.ts test/script/package-windows.test.ts
      - working-directory: packages/opencode
        run: bun typecheck
      - working-directory: packages/opencode
        run: bun run script/generate-brand-assets.ts --check
      - name: Build Windows x64 binaries
        working-directory: packages/opencode
        shell: pwsh
        run: |
          $env:CODEMAX_VERSION = "${{ inputs.version || github.ref_name }}".Replace("codemax-v", "")
          bun run script/build.ts --windows-x64
      - name: Sign executables when credentials are configured
        shell: pwsh
        run: ./script/sign-windows.ps1 packages/opencode/dist/codemax-windows-x64/bin/codemax.exe packages/opencode/dist/codemax-windows-x64-baseline/bin/codemax.exe
      - working-directory: packages/opencode
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}".Replace("codemax-v", "")
          bun run script/package-windows.ts --version $version --output dist/release
          & "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer/windows/codemax.iss
      - name: Write hashes after signing and packaging
        shell: pwsh
        run: |
          Set-Location packages/opencode/dist/release
          Get-FileHash CodeMax-x64.zip,CodeMax-x64-baseline.zip,CodeMax-Setup-x64.exe -Algorithm SHA256 | Sort-Object Path | ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } | Set-Content -Encoding utf8NoBOM SHA256SUMS.txt
      - shell: pwsh
        run: |
          bun script/codemax-release-check.ts packages/opencode/dist/release
          ./script/release/verify-artifacts.ps1 packages/opencode/dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: codemax-release
          path: packages/opencode/dist/release

  release:
    needs: build
    runs-on: ubuntu-24.04
    environment: codemax-private-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: codemax-release
          path: release
      - name: Create private draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          tag="${VERSION#codemax-v}"
          gh release create "codemax-v${tag}" release/* --draft --title "CodeMax ${tag}" --generate-notes
